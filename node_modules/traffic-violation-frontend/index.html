<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/traffic_light_hd.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Marga Rakshak | Government of Tamil Nadu – Smart Traffic Enforcement System</title>
  </head>
  <body>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML = '<div style="padding: 50px; background: white; color: red; z-index: 99999; position: relative;"><h2>Global Error!</h2><pre>' + message + '\n' + (error ? error.stack : '') + '</pre></div>';
        return true;
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML = '<div style="padding: 50px; background: white; color: red; z-index: 99999; position: relative;"><h2>Unhandled Promise Rejection!</h2><pre>' + (event.reason ? event.reason.stack || event.reason : event) + '</pre></div>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
